<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIESTAS Y EVENTOS DE LLANES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --dark-bg: #0a0a12;
            --card-bg: rgba(20, 20, 35, 0.8);
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.1) 0%, transparent 50%),
                linear-gradient(rgba(10, 10, 18, 0.9), rgba(10, 10, 18, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .cyber-header {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .neon-border {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            border-left: 4px solid var(--neon-blue);
        }

        .card.fiesta { border-left: 4px solid var(--neon-pink); }
        .card.fiesta:hover { box-shadow: 0 0 20px rgba(255, 0, 255, 0.2); }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-blue);
            font-weight: bold;
        }

        .badge-semana-actual {
            background: linear-gradient(90deg, var(--neon-pink), #800080);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; box-shadow: 0 0 20px var(--neon-pink); }
            100% { opacity: 0.8; }
        }

        .glitch-text {
            position: relative;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a12; }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 10px; border: 1px solid var(--neon-blue); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="cyber-header text-4xl md:text-6xl mb-2 glitch-text">Llanes 2026</h1>
        <p class="text-cyan-400 font-light tracking-widest uppercase">Agenda Futurista de Eventos</p>
        <div class="h-1 w-32 bg-cyan-500 mx-auto mt-4 rounded-full shadow-[0_0_10px_#00f3ff]"></div>
    </header>

    <main class="max-w-6xl mx-auto">
        
        <!-- Filtros -->
        <div id="filters" class="flex flex-wrap gap-3 mb-10 justify-center">
            <button onclick="filterEvents('all')" class="filter-btn active px-6 py-2 rounded-sm" id="btn-all">TODOS</button>
            <button onclick="filterEvents('Fiesta')" class="filter-btn px-6 py-2 rounded-sm" id="btn-fiesta">FIESTAS</button>
            <button onclick="filterEvents('Deporte')" class="filter-btn px-6 py-2 rounded-sm" id="btn-deporte">DEPORTE</button>
            <button onclick="filterEvents('Cultura')" class="filter-btn px-6 py-2 rounded-sm" id="btn-cultura">CULTURA</button>
            <button onclick="filterEvents('Infantil')" class="filter-btn px-6 py-2 rounded-sm" id="btn-infantil">INFANTIL</button>
        </div>

        <!-- Sección Semana Actual -->
        <section id="this-week-section" class="mb-16">
            <div class="flex items-center gap-4 mb-6">
                <h2 class="cyber-header text-2xl text-pink-500">Esta Semana</h2>
                <span class="px-3 py-1 text-xs badge-semana-actual rounded text-white font-bold">LIVE NOW</span>
            </div>
            <div id="this-week-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Se llena con JS -->
            </div>
        </section>

        <!-- Resto de Eventos -->
        <section>
            <h2 class="cyber-header text-2xl mb-8 text-cyan-500">Próximos Eventos</h2>
            <div id="events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Se llena con JS -->
            </div>
        </section>

    </main>

    <footer class="mt-20 py-10 border-t border-cyan-900 text-center">
        <p class="text-cyan-800 tracking-widest uppercase text-sm">Página web de Javi TJ</p>
    </footer>

    <script>
        // Datos extraídos del archivo (Simulando el parseo del .txt)
        const eventos = [
            { id: 1, fecha: "2026-04-01", titulo: "XIV Torneo de Fútbol Concejo de Llanes", categoria: "Deporte", lugar: "Llanes, Posada, Nueva", desc: "Torneo de fútbol base con equipos de diversas CCAA.", tipo: "evento" },
            { id: 2, fecha: "2026-04-01", titulo: "Semana Santa 2026", categoria: "Cultura", lugar: "Basílica de Llanes", desc: "Programa de actos religiosos y procesiones.", tipo: "evento" },
            { id: 3, fecha: "2026-04-02", titulo: "Exposición Retrato y Sociedad", categoria: "Cultura", lugar: "Porrúa", desc: "Fotografías de Daniel Álvarez Fervienza (1885-1899).", tipo: "evento" },
            { id: 4, fecha: "2026-04-03", titulo: "Puya de San Antonio", categoria: "Fiesta", lugar: "Riensena", desc: "Tradicional subasta de boronas y productos locales.", tipo: "fiesta" },
            { id: 5, fecha: "2026-04-03", titulo: "IX Fiesta de los Tortos", categoria: "Fiesta", lugar: "Meré", desc: "Gastronomía, música y tortos con picadillo.", tipo: "fiesta" },
            { id: 6, fecha: "2026-04-04", titulo: "Fiesta de la Primavera", categoria: "Fiesta", lugar: "Calduenu", desc: "Celebración comunitaria de la llegada del buen tiempo.", tipo: "fiesta" },
            { id: 7, fecha: "2026-04-05", titulo: "Concierto Virgen de la Flor", categoria: "Cultura", lugar: "Pría", desc: "Música y chocolatada tradicional.", tipo: "evento" },
            { id: 8, fecha: "2026-04-11", titulo: "Ruta Ecuestre y Cintas", categoria: "Deporte", lugar: "El Mazucu", desc: "Tradición ecuestre en la montaña llanisca.", tipo: "evento" },
            { id: 9, fecha: "2026-04-12", titulo: "Fiesta de Ntra. Sra. de la Flor", categoria: "Fiesta", lugar: "Pría", desc: "Fiesta patronal con misa y actos festivos.", tipo: "fiesta" },
            { id: 10, fecha: "2026-04-16", titulo: "IV Fant Llanes", categoria: "Cultura", lugar: "Llanes", desc: "Festival de Cine Fantástico y de Terror.", tipo: "evento" },
            { id: 11, fecha: "2026-04-18", titulo: "II Cova Negra Trail Fest", categoria: "Deporte", lugar: "Nueva", desc: "Prueba de trail running en entorno natural.", tipo: "evento" },
            { id: 12, fecha: "2026-04-23", titulo: "VI Encuentro del Libro Ilustrado", categoria: "Cultura", lugar: "Llanes y Nueva", desc: "Misterios de Tejos y actividades literarias.", tipo: "evento" },
            { id: 13, fecha: "2026-04-24", titulo: "Vuelta Ciclista Asturias (Etapa 2)", categoria: "Deporte", lugar: "Llanes", desc: "Salida de etapa de la mítica ronda asturiana.", tipo: "evento" },
            { id: 14, fecha: "2026-04-25", titulo: "Feria de Ganado San Jorge", categoria: "Fiesta", lugar: "Nueva", desc: "Tradicional mercado ganadero y fiesta patronal.", tipo: "fiesta" },
            { id: 15, fecha: "2026-05-01", titulo: "Fiesta de San Felipe", categoria: "Fiesta", lugar: "La Galguera", desc: "Inicio de las fiestas de mayo.", tipo: "fiesta" },
            { id: 16, fecha: "2026-05-02", titulo: "VIII Trail de Cuera", categoria: "Deporte", lugar: "Porrúa", desc: "32km de montaña con gran desnivel.", tipo: "evento" },
            { id: 17, fecha: "2026-05-09", titulo: "Fiesta de La Sacramental", categoria: "Fiesta", lugar: "Poo", desc: "Fiesta religiosa y popular comunitaria.", tipo: "fiesta" },
            { id: 18, fecha: "2026-05-15", titulo: "9º Eco-Rallye Villa de Llanes", categoria: "Deporte", lugar: "Llanes", desc: "Motor y sostenibilidad.", tipo: "evento" },
            { id: 19, fecha: "2026-05-16", titulo: "La Sacramental de Porrúa", categoria: "Fiesta", lugar: "Porrúa", desc: "Tradición y folclore llanisco.", tipo: "fiesta" },
            { id: 20, fecha: "2026-05-24", titulo: "Tri100Llanes", categoria: "Deporte", lugar: "Llanes", desc: "Triatlón de alta competición.", tipo: "evento" },
            { id: 21, fecha: "2026-05-27", titulo: "Cto. España Voleibol Infantil", categoria: "Deporte", lugar: "Llanes", desc: "Sede nacional de voleibol femenino.", tipo: "evento" },
            { id: 22, fecha: "2026-05-30", titulo: "Fiesta de San Fernando", categoria: "Fiesta", lugar: "Cué", desc: "Fiesta patronal junto al mar.", tipo: "fiesta" },
            { id: 23, fecha: "2026-04-17", titulo: "Taller Sombras Chinescas", categoria: "Infantil", lugar: "Llanes", desc: "Actividad creativa para niños.", tipo: "evento" }
        ];

        // Configuración de fecha actual según el documento (3 de abril de 2026 - Viernes)
        const HOY = new Date("2026-04-03");
        
        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1); // lunes
            return new Date(d.setDate(diff)).setHours(0,0,0,0);
        }

        function getEndOfWeek(date) {
            const start = new Date(getStartOfWeek(date));
            return new Date(start.setDate(start.getDate() + 6)).setHours(23,59,59,999);
        }

        const startWeek = getStartOfWeek(HOY);
        const endWeek = getEndOfWeek(HOY);

        function renderEvents(filter = 'all') {
            const container = document.getElementById('events-container');
            const weekContainer = document.getElementById('this-week-container');
            container.innerHTML = '';
            weekContainer.innerHTML = '';

            // Clasificar y ordenar: Fiestas primero
            const sortedEvents = [...eventos].sort((a, b) => {
                if (a.tipo === 'fiesta' && b.tipo !== 'fiesta') return -1;
                if (a.tipo !== 'fiesta' && b.tipo === 'fiesta') return 1;
                return new Date(a.fecha) - new Date(b.fecha);
            });

            sortedEvents.forEach(ev => {
                if (filter !== 'all' && ev.categoria !== filter) return;

                const evDate = new Date(ev.fecha).getTime();
                const isThisWeek = evDate >= startWeek && evDate <= endWeek;
                
                const cardHtml = `
                    <div class="card p-6 rounded-lg neon-border ${ev.tipo === 'fiesta' ? 'fiesta' : ''}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-bold px-2 py-1 bg-cyan-900 text-cyan-300 rounded">${ev.fecha.split('-').reverse().join('/')}</span>
                            <span class="text-xs uppercase tracking-tighter ${ev.tipo === 'fiesta' ? 'text-pink-500' : 'text-cyan-400'}">${ev.categoria}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 ${ev.tipo === 'fiesta' ? 'text-pink-400' : 'text-white'}">${ev.titulo}</h3>
                        <p class="text-gray-400 text-sm mb-4 font-light italic">${ev.lugar}</p>
                        <p class="text-gray-300 text-sm leading-relaxed">${ev.desc}</p>
                        <div class="mt-4 pt-4 border-t border-gray-800 flex justify-end">
                            <button class="text-xs font-bold hover:text-white transition-colors cursor-pointer text-cyan-600">MÁS INFO +</button>
                        </div>
                    </div>
                `;

                if (isThisWeek) {
                    weekContainer.innerHTML += cardHtml;
                } else {
                    container.innerHTML += cardHtml;
                }
            });

            if (weekContainer.innerHTML === '') {
                document.getElementById('this-week-section').style.display = 'none';
            } else {
                document.getElementById('this-week-section').style.display = 'block';
            }
        }

        function filterEvents(cat) {
            // UI Update
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${cat.toLowerCase()}`).classList.add('active');
            
            renderEvents(cat);
        }

        // Inicializar
        window.onload = () => renderEvents();

    </script>
</body>
</html>
