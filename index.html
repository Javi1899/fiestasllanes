      {iso:"2026-03-31", title:"Presentación novela: «Flor de Agua»", desc:"Presentación literaria en Llanes.", cat:"Cultural", url:"https://www.llanes.es/es/presentacion-de-la-novela-flor-de-agua-llanes"},
    ]
  },
  {
    mes:"ABRIL 2026", ym:"2026-04",
    eventos:[
      {iso:"2026-04-01", title:"Consulta eventos de abril", desc:"Los eventos de abril se publicarán próximamente en la agenda oficial de Llanes. Pulsa ⟳ ACTUALIZAR para obtener los datos más recientes.", cat:"Cultural", url:"https://www.llanes.es/es/agenda?month=2026-04"}
    ]
  }
];

// ── ESTADO
const CK = 'llanes_v6';
const TODAY = new Date().toISOString().slice(0,10);
let DATA=null, tabIdx=0, activeCat='TODOS', sourceType='seed';

// ── UI HELPERS
function setDot(s){document.getElementById('dot').className='dot'+(s==='spin'?' spin':'')}
function setStatus(t){document.getElementById('stxt').textContent=t}
function showApp(v){
  document.getElementById('loader').style.display=v?'none':'block';
  document.getElementById('app').style.display=v?'block':'none';
}
function setBadge(type){
  const el=document.getElementById('src-badge');
  el.style.display='inline-block';
  if(type==='live'){el.className='source-badge source-live';el.textContent='◉ EN DIRECTO'}
  else if(type==='cache'){el.className='source-badge source-cache';el.textContent='◎ CACHÉ'}
  else{el.className='source-badge source-seed';el.textContent='○ EMBEBIDO'}
}

// ── DATE HELPERS
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MES_ABR=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function fmtDate(iso){
  if(iso.includes('/')){
    const[a,b]=iso.split('/');
    const da=new Date(a+'T12:00:00'),db=new Date(b+'T12:00:00');
    return `${da.getDate()} ${MES_ABR[da.getMonth()]} – ${db.getDate()} ${MES_ABR[db.getMonth()]}`;
  }
  const d=new Date(iso+'T12:00:00');
  return `${DAYS[d.getDay()]} ${d.getDate()} ${MES_ABR[d.getMonth()]}`;
}
function isToday(iso){
  if(iso.includes('/')){const[a,b]=iso.split('/');return TODAY>=a&&TODAY<=b}
  return iso===TODAY;
}
function isPast(iso){
  return (iso.includes('/')?iso.split('/')[1]:iso)<TODAY;
}

// ── RENDER
function renderAll(){renderTabs();renderFilters();renderEvents()}

function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  DATA.forEach((m,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===tabIdx?' on':'');
    b.textContent=m.mes+' ('+m.eventos.length+')';
    b.onclick=()=>{tabIdx=i;activeCat='TODOS';renderAll()};
    el.appendChild(b);
  });
}

function renderFilters(){
  const m=DATA[tabIdx];
  const cats=['TODOS',...new Set(m.eventos.map(e=>e.cat))];
  const el=document.getElementById('filters');el.innerHTML='';
  const lbl=document.createElement('span');lbl.className='filter-label';lbl.textContent='FILTRAR:';el.appendChild(lbl);
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='ftag'+(c===activeCat?' active':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;renderFilters();renderEvents()};
    el.appendChild(b);
  });
}

function renderEvents(){
  const m=DATA[tabIdx];
  let evs=m.eventos.filter(e=>activeCat==='TODOS'||e.cat===activeCat);
  document.getElementById('slabel').textContent=
    m.mes+' // '+evs.length+' EVENTO'+(evs.length!==1?'S':'')+(activeCat!=='TODOS'?' // '+activeCat:'');
  const grid=document.getElementById('grid');grid.innerHTML='';
  if(!evs.length){grid.innerHTML='<div class="none">◈ SIN EVENTOS PARA ESTE FILTRO</div>';return}

  // Orden: hoy primero → futuros → pasados
  evs.sort((a,b)=>{
    const at=isToday(a.iso),bt=isToday(b.iso);
    if(at&&!bt)return -1;if(!at&&bt)return 1;
    const ap=isPast(a.iso),bp=isPast(b.iso);
    if(!ap&&bp)return -1;if(ap&&!bp)return 1;
    const ad=a.iso.split('/')[0],bd=b.iso.split('/')[0];
    return ad<bd?-1:ad>bd?1:0;
  });

  evs.forEach((ev,i)=>{
    const hoy=isToday(ev.iso),past=isPast(ev.iso);
    const card=document.createElement('div');
    card.className='card'+(hoy?' hoy':past?' past':'');
    card.style.animationDelay=(i*.05)+'s';
    const cs=CAT[ev.cat]||CAT['Cultural'];
    card.innerHTML=`
      <div class="cardnum">${String(i+1).padStart(2,'0')}</div>
      <div class="edate">${fmtDate(ev.iso)}</div>
      <div class="etitle">${ev.title}</div>
      ${ev.desc?`<div class="edesc">${ev.desc}</div>`:''}
      <div class="emeta">
        <span class="etag" style="${cs}">${ev.cat}</span>
        ${hoy?`<span class="etag" style="color:rgba(255,0,170,.95);border-color:rgba(255,0,170,.5)">▶ HOY</span>`:''}
        ${past&&!hoy?`<span class="etag" style="color:rgba(192,232,240,.3);border-color:rgba(192,232,240,.15)">PASADO</span>`:''}
        ${ev.url?`<a class="elink" href="${ev.url}" target="_blank">VER MÁS →</a>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

// ── AUTO-UPDATE: parsear HTML de llanes.es via proxy CORS
function guessCategory(title){
  const t=title.toLowerCase();
  if(/fiesta|antroxu|carnaval|romer|verbena|san |santo|virgen|ángel|angel|candelera/.test(t)) return 'Fiesta';
  if(/semana santa|procesión|misa|religios/.test(t)) return 'Religioso';
  if(/expos/.test(t)) return 'Exposición';
  if(/concierto/.test(t)) return 'Concierto';
  if(/taller/.test(t)) return 'Taller';
  if(/teatro|dramatizada|espectáculo/.test(t)) return 'Teatro';
  if(/cine|película|proyección|corto|documental|fórum/.test(t)) return 'Cine';
  if(/marcha|carrera|raid|rugby|golf|torneo|deport|juega/.test(t)) return 'Deportivo';
  if(/matanza|gochu|gastron|ollas|sabor/.test(t)) return 'Gastronomía';
  if(/conferencia|charla|homenaje|presentación|inauguración/.test(t)) return 'Conferencia';
  return 'Cultural';
}

async function fetchMonth(ym){
  // Intentar múltiples proxies CORS en orden de preferencia
  const proxies=[
    `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.llanes.es/es/agenda?month='+ym)}`,
    `https://corsproxy.io/?url=${encodeURIComponent('https://www.llanes.es/es/agenda?month='+ym)}`,
  ];
  for(const url of proxies){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const j=await r.json();
      const html=j.contents||j.body||'';
      if(html.length>1000) return html;
    }catch(e){console.warn('proxy fail',url,e)}
  }
  return null;
}

function parseMonthHTML(html, ym){
  const[year,month]=ym.split('-').map(Number);
  const doc=new DOMParser().parseFromString(html,'text/html');
  const seen=new Set();
  const eventos=[];

  doc.querySelectorAll('table td').forEach(td=>{
    const raw=td.textContent.trim();
    const dm=raw.match(/^(\d{1,2})/);
    if(!dm) return;
    const day=String(dm[1]).padStart(2,'0');
    const iso=`${year}-${String(month).padStart(2,'0')}-${day}`;

    td.querySelectorAll('a').forEach(a=>{
      const title=a.textContent.trim().replace(/\s+/g,' ');
      if(!title||title.length<5||seen.has(title)) return;
      // Ignorar genéricos
      if(/espacio joven llanes|taller de orientación educ|taller gratuito de comunicaci|grupo de conversación|formación usuarios/i.test(title)) return;
      seen.add(title);
      let href=a.getAttribute('href')||'';
      if(!href.startsWith('http')) href='https://www.llanes.es/'+href.replace(/^\.\.\//,'es/').replace(/^\/es\//,'es/');
      eventos.push({iso, title, cat:guessCategory(title), url:href, desc:''});
    });
  });

  const mesNombre=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][month-1]+' '+year;
  return {mes:mesNombre, ym, eventos};
}

async function tryLiveFetch(){
  const now=new Date();
  const meses=[];
  for(let i=0;i<2;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    setStatus(`DESCARGANDO ${ym}...`);
    const html=await fetchMonth(ym);
    if(html){
      const parsed=parseMonthHTML(html,ym);
      if(parsed.eventos.length>2) meses.push(parsed);
    }
  }
  if(!meses.length) throw new Error('Sin datos del proxy');
  return {fetchedOn:TODAY, meses};
}

// ── MAIN
async function init(force=false){
  setDot('spin');setStatus('VERIFICANDO...');
  const nowYM=TODAY.slice(0,7);
  const cacheKey=`${CK}_${nowYM}`;

  // Caché diaria con clave de mes
  if(!force){
    const cDate=localStorage.getItem(cacheKey+'_d');
    const cData=localStorage.getItem(cacheKey);
    if(cDate===TODAY&&cData){
      try{
        const saved=JSON.parse(cData);
        DATA=saved.meses||saved; // compatibilidad con versiones anteriores
        tabIdx=0;
        renderAll();showApp(true);
        const total=DATA.reduce((s,m)=>s+m.eventos.length,0);
        setDot('');setStatus(`${total} EVENTOS // CACHÉ ${TODAY}`);
        setBadge('cache');
        document.getElementById('uinfo').style.display='flex';
        document.getElementById('udate').textContent=cDate;
        return;
      }catch(e){}
    }
  }

  // Fetch en vivo
  document.getElementById('ltxt').textContent='CONECTANDO CON LLANES.ES...';
  setStatus('CONECTANDO...');
  try{
    const live=await tryLiveFetch();
    const total=live.meses.reduce((s,m)=>s+m.eventos.length,0);
    if(total>3){
      DATA=live.meses;
      localStorage.setItem(cacheKey,JSON.stringify(live));
      localStorage.setItem(cacheKey+'_d',TODAY);
      tabIdx=0;renderAll();showApp(true);
      setDot('');setStatus(`${total} EVENTOS // EN DIRECTO`);
      setBadge('live');
      document.getElementById('uinfo').style.display='flex';
      document.getElementById('udate').textContent=TODAY+' · DIRECTO';
      return;
    }
    throw new Error('datos insuficientes');
  }catch(e){console.warn('live fail:',e)}

  // Fallback SEED — mostrar solo meses actuales o futuros
  const nowYMM=TODAY.slice(0,7);
  DATA=SEED.filter(m=>m.ym>=nowYMM);
  if(!DATA.length) DATA=[...SEED];
  tabIdx=0;renderAll();showApp(true);
  const total=DATA.reduce((s,m)=>s+m.eventos.length,0);
  setDot('');setStatus(`${total} EVENTOS // DATOS EMBEBIDOS`);
  setBadge('seed');
  document.getElementById('uinfo').style.display='flex';
  document.getElementById('udate').textContent=TODAY+' · EMBEBIDO';
}

async function forceReload(){
  const nowYM=TODAY.slice(0,7);
  const cacheKey=`${CK}_${nowYM}`;
  localStorage.removeItem(cacheKey);
  localStorage.removeItem(cacheKey+'_d');
  document.getElementById('btnR').disabled=true;
  showApp(false);
  await init(true);
  document.getElementById('btnR').disabled=false;
}

window.addEventListener('load',()=>init());
</script>
