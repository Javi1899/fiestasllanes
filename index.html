<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLANES // AGENDA</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--c:#00f5ff;--m:#ff00aa;--dark:#020b14;--grid:rgba(0,245,255,0.04);--glow:0 0 20px rgba(0,245,255,.5);--glow2:0 0 40px rgba(0,245,255,.8),0 0 80px rgba(0,245,255,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#c0e8f0;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:60px 60px;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:40px 20px}

/* HEADER */
header{text-align:center;margin-bottom:48px}
.badge{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--m);margin-bottom:12px;opacity:.8;animation:blink 4s infinite}
@keyframes blink{0%,92%,100%{opacity:.8}96%{opacity:.1}}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(36px,7vw,78px);font-weight:900;color:var(--c);text-shadow:var(--glow2);letter-spacing:10px;line-height:1;margin-bottom:6px;animation:glitch 9s infinite}
@keyframes glitch{0%,91%,100%{text-shadow:var(--glow2);transform:none}93%{text-shadow:-3px 0 var(--m),3px 0 var(--c);transform:skewX(-1deg)}94%{text-shadow:3px 0 var(--m),-3px 0 var(--c);transform:skewX(1deg)}95%{text-shadow:var(--glow2);transform:none}}
.sub{font-family:'Orbitron',sans-serif;font-size:clamp(9px,1.5vw,13px);letter-spacing:5px;color:rgba(192,232,240,.4)}
.deco{display:flex;align-items:center;gap:16px;margin:26px 0;justify-content:center}
.deco::before,.deco::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);max-width:340px}
.diamond{width:8px;height:8px;border:1px solid var(--c);transform:rotate(45deg);box-shadow:0 0 10px var(--c)}

/* STATUS */
.sbar{display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(0,245,255,.15);background:rgba(0,245,255,.03);padding:12px 20px;margin-bottom:30px;font-family:'Share Tech Mono',monospace;font-size:12px;flex-wrap:wrap;gap:10px}
.si{display:flex;align-items:center;gap:8px;color:rgba(192,232,240,.6)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 8px var(--c);animation:pulse 2s infinite}
.dot.spin{background:var(--m);box-shadow:0 0 8px var(--m)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.btn{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--c);background:transparent;border:1px solid rgba(0,245,255,.4);padding:8px 20px;cursor:pointer;text-transform:uppercase;transition:all .3s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:rgba(0,245,255,.08);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.btn:hover::before{transform:scaleX(1)}
.btn:hover{box-shadow:var(--glow)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* FILTER BAR */
.filterbar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(192,232,240,.4);letter-spacing:2px;margin-right:4px}
.ftag{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(192,232,240,.5);background:transparent;border:1px solid rgba(0,245,255,.12);padding:5px 14px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.ftag:hover{border-color:rgba(0,245,255,.4);color:var(--c)}
.ftag.active{border-color:var(--c);color:var(--c);background:rgba(0,245,255,.07);box-shadow:var(--glow)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
.tab{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(192,232,240,.5);background:transparent;border:1px solid rgba(0,245,255,.12);padding:8px 18px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.tab:hover{border-color:rgba(0,245,255,.4);color:var(--c)}
.tab.on{border-color:var(--c);color:var(--c);background:rgba(0,245,255,.06);box-shadow:var(--glow)}

/* SECTION TITLE */
.stitle{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:rgba(192,232,240,.4);margin-bottom:22px;display:flex;align-items:center;gap:12px}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,245,255,.3),transparent)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

/* CARD */
.card{border:1px solid rgba(0,245,255,.12);background:rgba(0,245,255,.02);padding:22px;position:relative;overflow:hidden;transition:all .3s;animation:fadeUp .5s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--c),var(--m))}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--c),transparent);opacity:.6}
.card:hover{border-color:rgba(0,245,255,.35);background:rgba(0,245,255,.05);box-shadow:0 0 30px rgba(0,245,255,.1);transform:translateY(-2px)}
.card.hoy{border-color:rgba(255,0,170,.35);background:rgba(255,0,170,.04)}
.card.hoy::before{background:linear-gradient(180deg,var(--m),var(--c))}
.card.hoy::after{background:linear-gradient(90deg,var(--m),transparent)}
.card.past{opacity:.5}

.edate{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--m);text-shadow:0 0 10px var(--m);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.edate::before{content:'◈';font-size:8px;color:var(--c)}
.etitle{font-size:19px;font-weight:700;color:#e0f4ff;margin-bottom:10px;line-height:1.3}
.edesc{font-size:13px;color:rgba(192,232,240,.55);line-height:1.6;font-weight:300}
.emeta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center}
.etag{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;border:1px solid;padding:3px 10px;text-transform:uppercase}
.elink{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,245,255,.5);text-decoration:none;letter-spacing:1px;transition:color .2s}
.elink:hover{color:var(--c)}
.cardnum{position:absolute;top:12px;right:16px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,245,255,.2)}

/* LOADER */
#loader{text-align:center;padding:80px 20px}
.ring{width:60px;height:60px;border:2px solid rgba(0,245,255,.1);border-top-color:var(--c);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.ltext{font-family:'Share Tech Mono',monospace;color:rgba(192,232,240,.6);font-size:13px;letter-spacing:2px}

.none{text-align:center;padding:60px;font-family:'Share Tech Mono',monospace;color:rgba(192,232,240,.3);font-size:13px}

/* CORNERS */
.c{position:fixed;width:50px;height:50px;z-index:2;pointer-events:none}
.tl{top:16px;left:16px;border-top:1px solid var(--c);border-left:1px solid var(--c);opacity:.3}
.tr{top:16px;right:16px;border-top:1px solid var(--c);border-right:1px solid var(--c);opacity:.3}
.bl{bottom:16px;left:16px;border-bottom:1px solid var(--c);border-left:1px solid var(--c);opacity:.3}
.br{bottom:16px;right:16px;border-bottom:1px solid var(--c);border-right:1px solid var(--c);opacity:.3}

.pts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;width:1px;height:1px;border-radius:50%;opacity:0;animation:fl linear infinite}
@keyframes fl{0%{transform:translateY(100vh);opacity:0}10%{opacity:.5}90%{opacity:.1}100%{transform:translateY(-5vh) translateX(30px);opacity:0}}

footer{margin-top:60px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(192,232,240,.2);letter-spacing:2px;padding-bottom:40px}
footer a{color:rgba(0,245,255,.35);text-decoration:none}
footer a:hover{color:var(--c)}
</style>
</head>

// ── STATE
const CK='llanes_v5';  // new key = fresh start, ignores old cache
const TODAY = new Date().toISOString().slice(0,10);  // YYYY-MM-DD
let DATA=null, tabIdx=0, activeCat='TODOS';

function setDot(type){document.getElementById('dot').className='dot'+(type==='spin'?' spin':'')}
function setStatus(t){document.getElementById('stxt').textContent=t}
function showApp(v){document.getElementById('loader').style.display=v?'none':'block';document.getElementById('app').style.display=v?'block':'none'}

// Parse ISO date or range → display string
function fmtDate(iso){
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  if(iso.includes('/')){
    const [a,b]=iso.split('/');
    const da=new Date(a), db=new Date(b);
    return `${da.getDate()} ${MES[da.getMonth()]} – ${db.getDate()} ${MES[db.getMonth()]}`;
  }
  const d=new Date(iso+'T12:00:00');
  return `${DAYS[d.getDay()]} ${d.getDate()} ${MES[d.getMonth()]}`;
}

// Is event happening today?
function isToday(iso){
  if(iso.includes('/')){
    const [a,b]=iso.split('/');
    return TODAY>=a && TODAY<=b;
  }
  return iso===TODAY;
}

// Is event in the past?
function isPast(iso){
  const end=iso.includes('/')?iso.split('/')[1]:iso;
  return end<TODAY;
}

// ── RENDER
function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  DATA.forEach((m,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===tabIdx?' on':'');
    btn.textContent=m.mes+' ('+m.eventos.length+')';
    btn.onclick=()=>{tabIdx=i;activeCat='TODOS';renderAll()};
    el.appendChild(btn);
  });
}

function renderFilters(){
  const month=DATA[tabIdx];
  const cats=['TODOS',...new Set(month.eventos.map(e=>e.cat))];
  const el=document.getElementById('filters');el.innerHTML='';
  const lbl=document.createElement('span');lbl.className='filter-label';lbl.textContent='FILTRAR:';el.appendChild(lbl);
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='ftag'+(c===activeCat?' active':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;renderFilters();renderEvents()};
    el.appendChild(b);
  });
}

function renderEvents(){
  const month=DATA[tabIdx];
  let evs=month.eventos.filter(e=>activeCat==='TODOS'||e.cat===activeCat);
  const grid=document.getElementById('grid');grid.innerHTML='';

  // Sort: today first, then future by date, then past at end
  evs.sort((a,b)=>{
    const aT=isToday(a.iso),bT=isToday(b.iso);
    if(aT&&!bT)return -1;if(!aT&&bT)return 1;
    const aP=isPast(a.iso),bP=isPast(b.iso);
    if(!aP&&bP)return -1;if(aP&&!bP)return 1;
    const ad=a.iso.split('/')[0],bd=b.iso.split('/')[0];
    return ad<bd?-1:ad>bd?1:0;
  });

  const lbl=document.getElementById('slabel');
  lbl.textContent=month.mes+' // '+evs.length+' EVENTO'+(evs.length!==1?'S':'')+
    (activeCat!=='TODOS'?' // '+activeCat:'');

  if(!evs.length){grid.innerHTML='<div class="none">◈ SIN EVENTOS PARA ESTE FILTRO</div>';return}

  evs.forEach((ev,i)=>{
    const hoy=isToday(ev.iso), past=isPast(ev.iso);
    const card=document.createElement('div');
    card.className='card'+(hoy?' hoy':past?' past':'');
    card.style.animationDelay=(i*.05)+'s';
    const cs=CAT[ev.cat]||CAT['Cultural'];
    card.innerHTML=`
      <div class="cardnum">${String(i+1).padStart(2,'0')}</div>
      <div class="edate">${fmtDate(ev.iso)}</div>
      <div class="etitle">${ev.title}</div>
      ${ev.desc?`<div class="edesc">${ev.desc}</div>`:''}
      <div class="emeta">
        <span class="etag" style="${cs}">${ev.cat}</span>
        ${hoy?`<span class="etag" style="color:rgba(255,0,170,.95);border-color:rgba(255,0,170,.5)">▶ HOY</span>`:''}
        ${past&&!hoy?`<span class="etag" style="color:rgba(192,232,240,.3);border-color:rgba(192,232,240,.15)">PASADO</span>`:''}
        ${ev.url?`<a class="elink" href="${ev.url}" target="_blank">VER MÁS →</a>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

function renderAll(){renderTabs();renderFilters();renderEvents()}

// ── PROXY FETCH — intenta obtener datos frescos
async function tryFetch(){
  const PROXY='https://api.allorigins.win/get?url=';
  const now=new Date();
  const results=[];
  for(let m=0;m<2;m++){
    const d=new Date(now.getFullYear(),now.getMonth()+m,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const url='https://www.llanes.es/es/agenda?month='+ym;
    try{
      const r=await fetch(PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(9000)});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const j=await r.json();
      results.push({html:j.contents,d,ym});
    }catch(e){console.warn('proxy',ym,e)}
  }
  if(!results.length)throw new Error('proxy unavailable');
  return parseResults(results);
}

function parseResults(results){
  const MABBR=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const data=[];
  results.forEach(({html,d,ym})=>{
    const doc=new DOMParser().parseFromString(html,'text/html');
    const seen=new Set();
    const eventos=[];
    const mStr=MABBR[d.getMonth()].toUpperCase()+' '+d.getFullYear();

    doc.querySelectorAll('table td').forEach(td=>{
      const dm=td.textContent.trim().match(/^(\d{1,2})/);
      if(!dm)return;
      const day=String(dm[1]).padStart(2,'0');
      const isoDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+day;
      td.querySelectorAll('a').forEach(a=>{
        const title=a.textContent.trim();
        if(!title||title.length<5||seen.has(title))return;
        seen.add(title);
        let href=a.getAttribute('href')||'';
        if(!href.startsWith('http'))href='https://www.llanes.es/'+href.replace(/^\.\.\//,'es/');
        const t=title.toLowerCase();
        let cat='Cultural';
        if(/fiesta|antroxu|carnaval|romería|romer|san |santo|virgen|candelera|angel/.test(t))cat='Fiesta';
        else if(/expos/.test(t))cat='Exposición';
        else if(/concierto/.test(t))cat='Concierto';
        else if(/taller/.test(t))cat='Taller';
        else if(/teatro|dramatizada/.test(t))cat='Teatro';
        else if(/cine|película|proyección|corto|fórum|documental/.test(t))cat='Cine';
        else if(/marcha|carrera|deport|torneo|golf/.test(t))cat='Deportivo';
        else if(/gastron|matanza|gochu|ollas/.test(t))cat='Gastronomía';
        else if(/conferencia|charla/.test(t))cat='Conferencia';
        else if(/feria/.test(t))cat='Feria';
        eventos.push({iso:isoDate,title,cat,url:href,desc:''});
      });
    });

    if(eventos.length){
      data.push({mes:mStr,ym,eventos});
    }
  });
  return data;
}

// ── MAIN
async function init(force=false){
  setDot('spin');setStatus('VERIFICANDO CACHÉ...');

  // Smart cache: key includes current year+month so it auto-expires each month
  const nowYM = TODAY.slice(0,7); // YYYY-MM
  const cacheKey = CK+'_'+nowYM;
  const cached = localStorage.getItem(cacheKey);
  const cachedDate = localStorage.getItem(cacheKey+'_date');

  if(!force && cachedDate===TODAY && cached){
    try{
      DATA=JSON.parse(cached);
      renderAll();showApp(true);
      const total=DATA.reduce((s,m)=>s+m.eventos.length,0);
      setDot('');setStatus(`${total} EVENTOS // CACHÉ ${TODAY}`);
      document.getElementById('uinfo').style.display='flex';
      document.getElementById('udate').textContent=TODAY;
      return;
    }catch(e){}
  }

  // Try live fetch
  setStatus('CONECTANDO CON LLANES.ES...');
  document.getElementById('ltxt').textContent='CONECTANDO CON LLANES.ES...';
  try{
    const live=await tryFetch();
    const total=live.reduce((s,m)=>s+m.eventos.length,0);
    if(total>3){
      DATA=live;
      localStorage.setItem(cacheKey,JSON.stringify(DATA));
      localStorage.setItem(cacheKey+'_date',TODAY);
      renderAll();showApp(true);
      setDot('');setStatus(`${total} EVENTOS // EN DIRECTO`);
      document.getElementById('uinfo').style.display='flex';
      document.getElementById('udate').textContent=TODAY+' · EN DIRECTO';
      return;
    }
  }catch(e){console.warn('live fetch failed:',e)}

  // Fallback seed — auto-pick the right month(s)
  const nowYMM=TODAY.slice(0,7);
  DATA=SEED.filter(m=>m.ym>=nowYMM);
  if(!DATA.length)DATA=SEED;
  // Mark tab to show current month
  tabIdx=0;
  renderAll();showApp(true);
  const total=DATA.reduce((s,m)=>s+m.eventos.length,0);
  setDot('');setStatus(`${total} EVENTOS // DATOS EMBEBIDOS ${TODAY}`);
  document.getElementById('uinfo').style.display='flex';
  document.getElementById('udate').textContent=TODAY+' · EMBEBIDO';
}

async function forceReload(){
  const nowYM=TODAY.slice(0,7);
  localStorage.removeItem(CK+'_'+nowYM);
  localStorage.removeItem(CK+'_'+nowYM+'_date');
  document.getElementById('btnR').disabled=true;
  showApp(false);
  await init(true);
  document.getElementById('btnR').disabled=false;
}

window.addEventListener('load',()=>init());
