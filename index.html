<style>
  :root {
    --cyan: #00f5ff;
    --magenta: #ff00aa;
    --dark: #020b14;
    --grid: rgba(0,245,255,0.04);
    --glow: 0 0 20px rgba(0,245,255,0.5);
    --glow-strong: 0 0 40px rgba(0,245,255,0.8), 0 0 80px rgba(0,245,255,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark);
    color: #c0e8f0;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index:0; pointer-events:none;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    z-index:0; pointer-events:none;
  }
  .container { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:40px 20px; }

  header { text-align:center; margin-bottom:50px; }
  .header-badge {
    font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:4px;
    color:var(--magenta); margin-bottom:12px; opacity:0.8;
    animation: blink 4s infinite;
  }
  @keyframes blink { 0%,92%,100%{opacity:.8} 96%{opacity:.15} }
  h1 {
    font-family:'Orbitron',sans-serif;
    font-size: clamp(36px,7vw,80px);
    font-weight:900; color:var(--cyan);
    text-shadow: var(--glow-strong);
    letter-spacing:10px; line-height:1; margin-bottom:6px;
    animation: glitch 9s infinite;
  }
  @keyframes glitch {
    0%,91%,100%{text-shadow:var(--glow-strong);transform:none}
    93%{text-shadow:-3px 0 var(--magenta),3px 0 var(--cyan);transform:skewX(-1deg)}
    94%{text-shadow:3px 0 var(--magenta),-3px 0 var(--cyan);transform:skewX(1deg)}
    95%{text-shadow:var(--glow-strong);transform:none}
  }
  .subtitle { font-family:'Orbitron',sans-serif; font-size:clamp(9px,1.5vw,13px); letter-spacing:5px; color:rgba(192,232,240,.45); }
  .deco-line { display:flex; align-items:center; gap:16px; margin:28px 0; justify-content:center; }
  .deco-line::before,.deco-line::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); max-width:340px; }
  .deco-diamond { width:8px; height:8px; border:1px solid var(--cyan); transform:rotate(45deg); box-shadow:0 0 10px var(--cyan); }

  .status-bar {
    display:flex; justify-content:space-between; align-items:center;
    border:1px solid rgba(0,245,255,.15); background:rgba(0,245,255,.03);
    padding:12px 20px; margin-bottom:36px;
    font-family:'Share Tech Mono',monospace; font-size:12px;
    flex-wrap:wrap; gap:10px;
  }
  .status-item { display:flex; align-items:center; gap:8px; color:rgba(192,232,240,.6); }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:pulse 2s infinite; }
  .status-dot.loading { background:var(--magenta); box-shadow:0 0 8px var(--magenta); }
  .status-dot.error { background:#ff4444; box-shadow:0 0 8px #ff4444; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .btn-refresh {
    font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:2px;
    color:var(--cyan); background:transparent; border:1px solid rgba(0,245,255,.4);
    padding:8px 20px; cursor:pointer; text-transform:uppercase; transition:all .3s;
    position:relative; overflow:hidden;
  }
  .btn-refresh::before { content:''; position:absolute; inset:0; background:rgba(0,245,255,.08); transform:scaleX(0); transform-origin:left; transition:transform .3s; }
  .btn-refresh:hover::before { transform:scaleX(1); }
  .btn-refresh:hover { box-shadow:var(--glow); }
  .btn-refresh:disabled { opacity:.4; cursor:not-allowed; }

  .tabs { display:flex; gap:4px; margin-bottom:30px; flex-wrap:wrap; }
  .tab {
    font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:2px;
    color:rgba(192,232,240,.5); background:transparent; border:1px solid rgba(0,245,255,.12);
    padding:8px 18px; cursor:pointer; transition:all .2s; text-transform:uppercase;
  }
  .tab:hover { border-color:rgba(0,245,255,.4); color:var(--cyan); }
  .tab.active { border-color:var(--cyan); color:var(--cyan); background:rgba(0,245,255,.06); box-shadow:var(--glow); }

  .section-title {
    font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:4px;
    color:rgba(192,232,240,.4); margin-bottom:24px;
    display:flex; align-items:center; gap:12px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(0,245,255,.3),transparent); }

  .events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; }

  .event-card {
    border:1px solid rgba(0,245,255,.12); background:rgba(0,245,255,.02);
    padding:22px; position:relative; overflow:hidden; transition:all .3s;
    animation:fadeInUp .5s both;
  }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .event-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(--cyan),var(--magenta)); }
  .event-card::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--cyan),transparent); opacity:.6; }
  .event-card:hover { border-color:rgba(0,245,255,.35); background:rgba(0,245,255,.05); box-shadow:0 0 30px rgba(0,245,255,.1); transform:translateY(-2px); }
  .event-card.today-card { border-color:rgba(255,0,170,.35); background:rgba(255,0,170,.04); }
  .event-card.today-card::before { background:linear-gradient(180deg,var(--magenta),var(--cyan)); }
  .event-card.today-card::after { background:linear-gradient(90deg,var(--magenta),transparent); }

  .event-date { font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:3px; color:var(--magenta); text-shadow:0 0 10px var(--magenta); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .event-date::before { content:'◈'; font-size:8px; color:var(--cyan); }
  .event-title { font-family:'Rajdhani',sans-serif; font-size:19px; font-weight:700; color:#e0f4ff; margin-bottom:10px; line-height:1.3; }
  .event-desc { font-size:13px; color:rgba(192,232,240,.55); line-height:1.6; font-weight:300; }
  .event-meta { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center; }
  .event-tag { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:rgba(0,245,255,.7); border:1px solid rgba(0,245,255,.2); padding:3px 10px; text-transform:uppercase; }
  .event-link { font-family:'Share Tech Mono',monospace; font-size:10px; color:rgba(0,245,255,.5); text-decoration:none; letter-spacing:1px; transition:color .2s; }
  .event-link:hover { color:var(--cyan); }
  .card-number { position:absolute; top:12px; right:16px; font-family:'Share Tech Mono',monospace; font-size:10px; color:rgba(0,245,255,.2); }

  #loader { text-align:center; padding:80px 20px; }
  .loader-ring { width:60px; height:60px; border:2px solid rgba(0,245,255,.1); border-top-color:var(--cyan); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loader-text { font-family:'Share Tech Mono',monospace; color:rgba(192,232,240,.6); font-size:13px; letter-spacing:2px; }

  .no-events { text-align:center; padding:60px 20px; font-family:'Share Tech Mono',monospace; color:rgba(192,232,240,.35); font-size:13px; }

  .corner { position:fixed; width:50px; height:50px; z-index:2; pointer-events:none; }
  .corner-tl{top:16px;left:16px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);opacity:.35}
  .corner-tr{top:16px;right:16px;border-top:1px solid var(--cyan);border-right:1px solid var(--cyan);opacity:.35}
  .corner-bl{bottom:16px;left:16px;border-bottom:1px solid var(--cyan);border-left:1px solid var(--cyan);opacity:.35}
  .corner-br{bottom:16px;right:16px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan);opacity:.35}

  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle { position:absolute; width:1px; height:1px; background:var(--cyan); border-radius:50%; opacity:0; animation:float linear infinite; }
  @keyframes float { 0%{transform:translateY(100vh);opacity:0} 10%{opacity:.5} 90%{opacity:.15} 100%{transform:translateY(-5vh) translateX(40px);opacity:0} }

  footer { margin-top:60px; text-align:center; font-family:'Share Tech Mono',monospace; font-size:11px; color:rgba(192,232,240,.2); letter-spacing:2px; padding-bottom:40px; }
  footer a { color:rgba(0,245,255,.4); text-decoration:none; }
  footer a:hover { color:var(--cyan); }
</style>

  document.getElementById('loader').style.display = show ? 'none' : 'block';
  document.getElementById('main-content').style.display = show ? 'block' : 'none';
}

// ── CAT COLORS ───────────────────────────────────────────────
const CAT_COLORS = {
  'Fiesta':     'color:rgba(255,0,170,.9);border-color:rgba(255,0,170,.35)',
  'Concierto':  'color:rgba(255,220,0,.85);border-color:rgba(255,220,0,.3)',
  'Gastronomía':'color:rgba(0,255,128,.8);border-color:rgba(0,255,128,.25)',
  'Deportivo':  'color:rgba(255,110,0,.85);border-color:rgba(255,110,0,.3)',
  'Cine':       'color:rgba(180,100,255,.9);border-color:rgba(180,100,255,.3)',
  'Teatro':     'color:rgba(255,60,60,.85);border-color:rgba(255,60,60,.3)',
  'Feria':      'color:rgba(255,165,0,.85);border-color:rgba(255,165,0,.3)',
  'Exposición': 'color:rgba(0,245,255,.7);border-color:rgba(0,245,255,.2)',
};

// ── RENDER ───────────────────────────────────────────────────
function renderAll(data){
  DATA = data;
  renderTabs();
  renderEvents();
  showMain(true);
  document.getElementById('update-info').style.display = 'flex';
  document.getElementById('update-date').textContent = data.fetchedOn;
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  DATA.months.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === activeTab ? ' active' : '');
    btn.textContent = m.label + ' (' + m.events.length + ')';
    btn.onclick = () => { activeTab = i; renderTabs(); renderEvents(); };
    el.appendChild(btn);
  });
}

function renderEvents(){
  const month = DATA.months[activeTab];
  const grid = document.getElementById('events-grid');
  grid.innerHTML = '';

  document.getElementById('section-label').textContent =
    month.label + ' // ' + month.events.length + ' EVENTO' + (month.events.length!==1?'S':'');

  if(!month.events.length){
    grid.innerHTML = '<div class="no-events">◈ SIN EVENTOS REGISTRADOS PARA ESTE MES</div>';
    return;
  }

  // Today cards first
  const sorted = [
    ...month.events.filter(e=>e.hoy),
    ...month.events.filter(e=>!e.hoy)
  ];

  sorted.forEach((ev, i) => {
    const card = document.createElement('div');
    card.className = 'event-card' + (ev.hoy ? ' today-card' : '');
    card.style.animationDelay = (i*0.055)+'s';
    const cs = CAT_COLORS[ev.cat] || 'color:rgba(192,232,240,.6);border-color:rgba(192,232,240,.15)';
    card.innerHTML = `
      <div class="card-number">${String(i+1).padStart(2,'0')}</div>
      <div class="event-date">${ev.date}</div>
      <div class="event-title">${ev.title}</div>
      ${ev.desc ? `<div class="event-desc">${ev.desc}</div>` : ''}
      <div class="event-meta">
        ${ev.cat ? `<span class="event-tag" style="${cs}">${ev.cat}</span>` : ''}
        ${ev.hoy ? `<span class="event-tag" style="color:rgba(255,0,170,.9);border-color:rgba(255,0,170,.4)">▶ HOY</span>` : ''}
        ${ev.url ? `<a class="event-link" href="${ev.url}" target="_blank">VER MÁS →</a>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

// ── LIVE FETCH via CORS proxy ─────────────────────────────────
async function tryLiveFetch(){
  const PROXY = 'https://api.allorigins.win/get?url=';
  const now = new Date();
  const results = [];

  for(let m=0; m<2; m++){
    const d = new Date(now.getFullYear(), now.getMonth()+m, 1);
    const ym = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const url = 'https://www.llanes.es/es/agenda?month='+ym;
    try{
      const r = await fetch(PROXY+encodeURIComponent(url), {signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error('HTTP '+r.status);
      const json = await r.json();
      results.push({html: json.contents, d});
    } catch(e){ console.warn('proxy fail', ym, e); }
  }
  if(!results.length) throw new Error('proxy unavailable');

  return parseHTML(results);
}

function parseHTML(results){
  const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const MONTHS_ABBR = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const now = new Date();
  const data = { fetchedOn: now.toLocaleDateString('es-ES'), months:[] };

  results.forEach(({html, d}) => {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const seen = new Set();
    const events = [];
    const mAbbr = MONTHS_ABBR[d.getMonth()];
    const mLabel = MONTHS_ABBR[d.getMonth()].toUpperCase() + ' ' + d.getFullYear();

    doc.querySelectorAll('table td').forEach(td => {
      const dayMatch = td.textContent.trim().match(/^(\d{1,2})/);
      if(!dayMatch) return;
      const day = dayMatch[1];
      td.querySelectorAll('a').forEach(a => {
        const title = a.textContent.trim();
        if(!title || title.length < 5 || seen.has(title)) return;
        seen.add(title);
        let href = a.getAttribute('href')||'';
        if(!href.startsWith('http')) href = 'https://www.llanes.es/'+href.replace(/^\.\.\//,'es/');
        let cat='Cultural';
        const t=title.toLowerCase();
        if(/fiesta|antroxu|carnaval|romería|san |santo|virgen|candelera/.test(t)) cat='Fiesta';
        else if(/expos/.test(t)) cat='Exposición';
        else if(/concierto/.test(t)) cat='Concierto';
        else if(/taller/.test(t)) cat='Taller';
        else if(/teatro|dramatizada/.test(t)) cat='Teatro';
        else if(/cine|película|proyección|corto|fórum/.test(t)) cat='Cine';
        else if(/marcha|carrera|deport/.test(t)) cat='Deportivo';
        else if(/gastron|matanza|gochu|ollas/.test(t)) cat='Gastronomía';
        else if(/feria/.test(t)) cat='Feria';
        const isToday = (
          parseInt(day) === now.getDate() &&
          d.getMonth() === now.getMonth() &&
          d.getFullYear() === now.getFullYear()
        );
        events.push({date:`${day} ${mAbbr}`, title, cat, url:href, desc:'', hoy:isToday});
      });
    });

    if(events.length) data.months.push({label:mLabel, events});
  });

  return data;
}

// ── MAIN ─────────────────────────────────────────────────────
async function init(){
  setStatus('loading','INICIALIZANDO...');
  document.getElementById('loader-text').textContent = 'CARGANDO EVENTOS...';

  // Check cache
  const cDate = localStorage.getItem(CACHE_DATE);
  const cData = localStorage.getItem(CACHE_KEY);
  if(cDate === TODAY_STR && cData){
    try{
      const d = JSON.parse(cData);
      renderAll(d);
      const total = d.months.reduce((s,m)=>s+m.events.length,0);
      setStatus('ok', `${total} EVENTOS // CACHÉ DIARIA`);
      return;
    } catch(e){}
  }

  // Try live
  document.getElementById('loader-text').textContent = 'CONECTANDO CON LLANES.ES...';
  setStatus('loading','CONECTANDO CON LLANES.ES...');
  try{
    const d = await tryLiveFetch();
    const total = d.months.reduce((s,m)=>s+m.events.length,0);
    // If live returned reasonable data, use it; otherwise fallback
    if(total > 0){
      localStorage.setItem(CACHE_KEY, JSON.stringify(d));
      localStorage.setItem(CACHE_DATE, TODAY_STR);
      renderAll(d);
      setStatus('ok', `${total} EVENTOS // EN DIRECTO`);
      return;
    }
    throw new Error('empty');
  } catch(e){
    console.warn('Using seed data:', e);
  }

  // Fallback to seed
  localStorage.setItem(CACHE_KEY, JSON.stringify(SEED));
  localStorage.setItem(CACHE_DATE, TODAY_STR);
  renderAll(SEED);
  const total = SEED.months.reduce((s,m)=>s+m.events.length,0);
  setStatus('ok', `${total} EVENTOS // DATOS EMBEBIDOS`);
}

async function forceReload(){
  localStorage.removeItem(CACHE_DATE);
  document.getElementById('btn-refresh').disabled = true;
  showMain(false);
  setStatus('loading','RECARGANDO...');
  await init();
  document.getElementById('btn-refresh').disabled = false;
}

window.addEventListener('load', init);
</script>
